name: Feature Request
description: Have an idea for a new feature? Request it here! No plugin requests, go to our Discord server for that
labels: [enhancement]
title: "[Feature] <title>"

body:
    - type: markdown
      attributes:
          value: |
            This form is not for any of the following:
            - Plugin requests — Go to our [Discord server](https://discord.gg/D9uwnFnqmd) for that
            - Feature requests for plugins — Go to our [Discord server](https://discord.gg/D9uwnFnqmd) for that

    - type: textarea
      id: feature-description
      attributes:
          label: A clear and concise description of the feature you'd like to see
      validations:
          required: true

    - type: textarea
      id: implementation-notes
      attributes:
          label: Implementation Notes
          description: If you have ideas about how this could be implemented technically, share them here
      validations:
          required: false

    - type: textarea
      id: additional-context
      attributes:
          label: Additional context
          description: Screenshots, mockups, examples from other apps, etc.
      validations:
          required: false

    - type: checkboxes
      id: agreement-check
      attributes:
          label: Request Agreement
          options:
            - label: I've searched existing issues and this hasn't been suggested before
            - label: This is a **core modification feature**, not a plugin request (those go in Discord)
            - label: This feature would benefit most users, not just a specific use case
            - label: I am willing to work on this myself
